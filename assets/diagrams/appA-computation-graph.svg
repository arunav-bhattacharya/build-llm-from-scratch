<svg viewBox="0 0 760 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-acg d-acg">
  <title id="t-acg">A logistic regression forward pass as a computation graph</title>
  <desc id="d-acg">The input x1 times weight w1 plus bias b gives the net input z; a sigmoid turns z into the output a; comparing a with the label y gives the loss. Arrows flow left to right through the operations.</desc>
  <defs>
    <marker id="ar-acg" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" class="d-arrow"/></marker>
  </defs>

  <!-- inputs / params (left column) -->
  <rect class="d-node" x="20" y="28" width="92" height="36" rx="9"/><text class="d-c d-bold d-s" x="66" y="51">input x1</text>
  <rect class="d-soft" x="20" y="92" width="92" height="36" rx="9"/><text class="d-c d-tac d-bold d-s" x="66" y="115">weight w1</text>
  <rect class="d-soft" x="20" y="156" width="92" height="36" rx="9"/><text class="d-c d-tac d-bold d-s" x="66" y="179">bias b</text>
  <rect class="d-node" x="20" y="206" width="92" height="36" rx="9"/><text class="d-c d-bold d-s" x="66" y="229">label y</text>

  <!-- multiply node -->
  <rect class="d-node" x="184" y="62" width="80" height="40" rx="10"/><text class="d-c d-bold" x="224" y="87">×</text>
  <line class="d-line" x1="112" y1="46" x2="180" y2="74" marker-end="url(#ar-acg)"/>
  <line class="d-line" x1="112" y1="110" x2="180" y2="90" marker-end="url(#ar-acg)"/>

  <!-- add node -->
  <rect class="d-node" x="320" y="92" width="92" height="40" rx="10"/><text class="d-c d-bold d-s" x="366" y="117">+ → z</text>
  <line class="d-line" x1="264" y1="84" x2="316" y2="106" marker-end="url(#ar-acg)"/>
  <line class="d-line" x1="112" y1="174" x2="316" y2="120" marker-end="url(#ar-acg)"/>

  <!-- sigmoid node -->
  <rect class="d-node" x="468" y="92" width="110" height="40" rx="10"/><text class="d-c d-bold d-s" x="523" y="117">σ → a</text>
  <line class="d-line" x1="412" y1="112" x2="464" y2="112" marker-end="url(#ar-acg)"/>
  <text class="d-c d-tmut d-xs" x="523" y="82">sigmoid activation</text>

  <!-- loss node -->
  <rect class="d-fill-accent" x="634" y="92" width="104" height="40" rx="10"/><text class="d-c d-tinv d-bold d-s" x="686" y="117">loss</text>
  <line class="d-line-accent" x1="578" y1="112" x2="630" y2="112" marker-end="url(#ar-acg)"/>
  <line class="d-line" x1="112" y1="224" x2="660" y2="130" marker-end="url(#ar-acg)"/>

  <text class="d-c d-tac d-bold d-xs" x="380" y="220">forward pass: data flows left → right to produce the loss</text>
</svg>
