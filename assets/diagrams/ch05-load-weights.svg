<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-lw d-lw">
  <title id="t-lw">Loading OpenAI GPT-2 weights into our model</title>
  <desc id="d-lw">OpenAI's published GPT-2 parameter dictionary is matched layer by layer onto our GPTModel's embeddings, attention, feed-forward, and layer-norm weights using an assign helper.</desc>
  <defs>
    <marker id="ar-c5lw" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" class="d-arrow"/></marker>
    <marker id="ar-c5lw2" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" class="d-arrow-accent"/></marker>
  </defs>

  <!-- source: OpenAI params -->
  <rect class="d-panel" x="28" y="60" width="220" height="200" rx="14"/>
  <text class="d-c d-bold d-s" x="138" y="86">OpenAI GPT-2 params</text>
  <text class="d-c d-tmut d-xs" x="138" y="104">downloaded weight dict</text>
  <rect class="d-soft" x="48" y="116" width="180" height="30" rx="8"/><text class="d-c d-s" x="138" y="136">wte · wpe</text>
  <rect class="d-soft" x="48" y="152" width="180" height="30" rx="8"/><text class="d-c d-s" x="138" y="172">blocks[b].attn · mlp</text>
  <rect class="d-soft" x="48" y="188" width="180" height="30" rx="8"/><text class="d-c d-s" x="138" y="208">ln_1 · ln_2 · g · b</text>
  <text class="d-c d-tmut d-xs" x="138" y="240">TensorFlow naming</text>

  <!-- assign bridge -->
  <line class="d-line-accent" x1="248" y1="160" x2="312" y2="160" marker-end="url(#ar-c5lw2)"/>
  <rect class="d-fill-accent" x="314" y="138" width="132" height="44" rx="11"/><text class="d-c d-tinv d-bold d-s" x="380" y="160">assign()</text><text class="d-c d-tinv d-xs" x="380" y="174">shape-checked copy</text>
  <line class="d-line-accent" x1="446" y1="160" x2="510" y2="160" marker-end="url(#ar-c5lw2)"/>

  <!-- destination: our GPTModel -->
  <rect class="d-panel" x="512" y="60" width="220" height="200" rx="14"/>
  <text class="d-c d-bold d-s" x="622" y="86">our GPTModel</text>
  <text class="d-c d-tmut d-xs" x="622" y="104">random → pretrained</text>
  <rect class="d-node" x="532" y="116" width="180" height="30" rx="8"/><text class="d-c d-s" x="622" y="136">tok_emb · pos_emb</text>
  <rect class="d-node" x="532" y="152" width="180" height="30" rx="8"/><text class="d-c d-s" x="622" y="172">trf_blocks[b].att · ff</text>
  <rect class="d-node" x="532" y="188" width="180" height="30" rx="8"/><text class="d-c d-s" x="622" y="208">norm1 · norm2 · final_norm</text>
  <text class="d-c d-tmut d-xs" x="622" y="240">our naming</text>

  <text class="d-c d-tmut d-xs" x="380" y="284">a shape mismatch raises an error — so a wiring mistake is caught immediately</text>
</svg>
