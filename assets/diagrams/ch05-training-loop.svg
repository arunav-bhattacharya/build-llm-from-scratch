<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-tl d-tl">
  <title id="t-tl">The training loop</title>
  <desc id="d-tl">For each epoch, iterate over batches: reset gradients, compute loss on the batch, backpropagate, and update weights with the optimizer. Periodically evaluate and print a sample.</desc>
  <defs>
    <marker id="ar-c5tl" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" class="d-arrow"/></marker>
    <marker id="ar-c5tl2" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" class="d-arrow-accent"/></marker>
  </defs>

  <!-- outer epoch frame -->
  <rect class="d-panel" x="20" y="56" width="720" height="156" rx="14"/>
  <text class="d-tmut d-xs" x="36" y="78">for each epoch · for each batch in the training set</text>

  <!-- step boxes inside -->
  <rect class="d-node" x="40" y="98" width="118" height="48" rx="10"/><text class="d-c d-bold d-s" x="99" y="120">zero_grad</text><text class="d-c d-tmut d-xs" x="99" y="136">reset gradients</text>

  <line class="d-line" x1="158" y1="122" x2="194" y2="122" marker-end="url(#ar-c5tl)"/>
  <rect class="d-node" x="196" y="98" width="118" height="48" rx="10"/><text class="d-c d-bold d-s" x="255" y="120">forward</text><text class="d-c d-tmut d-xs" x="255" y="136">compute loss</text>

  <line class="d-line" x1="314" y1="122" x2="350" y2="122" marker-end="url(#ar-c5tl)"/>
  <rect class="d-node" x="352" y="98" width="118" height="48" rx="10"/><text class="d-c d-bold d-s" x="411" y="120">backward</text><text class="d-c d-tmut d-xs" x="411" y="136">loss gradients</text>

  <line class="d-line" x1="470" y1="122" x2="506" y2="122" marker-end="url(#ar-c5tl)"/>
  <rect class="d-fill-accent" x="508" y="98" width="132" height="48" rx="10"/><text class="d-c d-tinv d-bold d-s" x="574" y="120">optimizer.step</text><text class="d-c d-tinv d-xs" x="574" y="136">update weights</text>

  <!-- loop-back arrow next batch -->
  <line class="d-line-accent" x1="574" y1="146" x2="574" y2="176" marker-end="url(#ar-c5tl2)"/>
  <path class="d-line-accent" d="M574 176 L99 176 L99 150" fill="none" marker-end="url(#ar-c5tl2)"/>
  <rect class="d-chip" x="300" y="166" width="148" height="22" rx="11"/><text class="d-c d-xs d-bold" x="374" y="181">repeat · next batch</text>

  <!-- periodic eval lane below -->
  <line class="d-line" x1="574" y1="146" x2="574" y2="238" marker-end="url(#ar-c5tl)"/>
  <text class="d-e d-tmut d-xs" x="690" y="216">every eval_freq steps</text>
  <rect class="d-soft" x="240" y="240" width="200" height="48" rx="10"/><text class="d-c d-tac d-bold d-s" x="340" y="262">evaluate_model</text><text class="d-c d-tmut d-xs" x="340" y="278">train + val loss</text>

  <rect class="d-soft" x="468" y="240" width="232" height="48" rx="10"/><text class="d-c d-tac d-bold d-s" x="584" y="262">generate sample text</text><text class="d-c d-tmut d-xs" x="584" y="278">eyeball the progress</text>

  <line class="d-line" x1="440" y1="264" x2="466" y2="264" marker-end="url(#ar-c5tl)"/>

  <text class="d-c d-tmut d-xs" x="380" y="316">one epoch = one full pass over the training set</text>
</svg>
