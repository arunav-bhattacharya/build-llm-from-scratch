<svg viewBox="0 0 760 244" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-lj d-lj">
  <title id="t-lj">Using an LLM as an automated judge</title>
  <desc id="d-lj">The instruction, the reference answer, and the fine-tuned model's response are sent to a Llama 3 model running in Ollama, which returns a score from 0 to 100.</desc>
  <defs>
    <marker id="ar-c7d" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" class="d-arrow"/></marker>
    <marker id="ar-c7d2" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" class="d-arrow-accent"/></marker>
  </defs>

  <!-- three inputs -->
  <rect class="d-node" x="24" y="36" width="218" height="42" rx="10"/>
  <text class="d-c d-bold d-s" x="133" y="56">instruction</text>
  <text class="d-c d-tmut d-xs" x="133" y="71">the task that was asked</text>

  <rect class="d-soft" x="24" y="100" width="218" height="42" rx="10"/>
  <text class="d-c d-tac d-bold d-s" x="133" y="120">reference answer</text>
  <text class="d-c d-tmut d-xs" x="133" y="135">the correct test-set output</text>

  <rect class="d-node" x="24" y="164" width="218" height="42" rx="10"/>
  <text class="d-c d-bold d-s" x="133" y="184">model response</text>
  <text class="d-c d-tmut d-xs" x="133" y="199">what our LLM generated</text>

  <!-- arrows into judge -->
  <line class="d-line" x1="242" y1="57" x2="352" y2="108" marker-end="url(#ar-c7d)"/>
  <line class="d-line" x1="242" y1="121" x2="352" y2="121" marker-end="url(#ar-c7d)"/>
  <line class="d-line" x1="242" y1="185" x2="352" y2="134" marker-end="url(#ar-c7d)"/>

  <!-- judge -->
  <rect class="d-node" x="356" y="86" width="190" height="72" rx="12"/>
  <text class="d-c d-bold d-s" x="451" y="114">Llama 3 (8B)</text>
  <text class="d-c d-bold d-s" x="451" y="132">via Ollama</text>
  <text class="d-c d-tmut d-xs" x="451" y="178">automated judge · runs locally</text>

  <!-- arrow to score -->
  <line class="d-line-accent" x1="546" y1="122" x2="600" y2="122" marker-end="url(#ar-c7d2)"/>

  <!-- score -->
  <rect class="d-fill-accent" x="602" y="92" width="134" height="60" rx="12"/>
  <text class="d-c d-tinv d-bold" x="669" y="118" font-size="15">score</text>
  <text class="d-c d-tinv d-bold" x="669" y="140" font-size="15">0 – 100</text>

  <text class="d-c d-tmut d-xs" x="380" y="228">"Respond with the integer number only." — averaged over the test set for one quality number.</text>
</svg>
