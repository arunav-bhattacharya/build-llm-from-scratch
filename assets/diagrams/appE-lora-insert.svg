<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-aEi d-aEi">
  <title id="t-aEi">A Linear layer wrapped with a LoRA branch</title>
  <desc id="d-aEi">In a LinearWithLoRA module, the input flows through both the original frozen Linear layer (weights W) and a small LoRA branch (matrices A then B). Their outputs are summed. Only the LoRA branch carries gradients.</desc>
  <defs>
    <marker id="ar-aEb" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" class="d-arrow"/></marker>
  </defs>

  <text class="d-c d-tmut d-xs" x="380" y="34">output = linear(x) + lora(x)</text>

  <!-- input -->
  <rect class="d-node" x="34" y="128" width="92" height="48" rx="11"/><text class="d-c d-bold" x="80" y="158">x</text>

  <!-- split: up to frozen Linear, down to LoRA -->
  <line class="d-line" x1="126" y1="142" x2="214" y2="96" marker-end="url(#ar-aEb)"/>
  <line class="d-line" x1="126" y1="162" x2="214" y2="208" marker-end="url(#ar-aEb)"/>

  <!-- frozen Linear (top path) -->
  <rect class="d-node-2" x="218" y="74" width="210" height="50" rx="11"/>
  <text class="d-c d-bold d-s" x="323" y="96">Linear · W  (frozen ❄)</text>
  <text class="d-c d-tmut d-xs" x="323" y="114">original pretrained weights</text>

  <!-- LoRA branch (bottom path): A then B -->
  <rect class="d-fill-accent" x="218" y="184" width="96" height="50" rx="11"/><text class="d-c d-tinv d-bold d-s" x="266" y="206">A</text><text class="d-c d-tinv d-xs" x="266" y="224">d × r</text>
  <line class="d-line-accent" x1="314" y1="209" x2="350" y2="209" marker-end="url(#ar-aEb)"/>
  <rect class="d-fill-accent" x="352" y="184" width="96" height="50" rx="11"/><text class="d-c d-tinv d-bold d-s" x="400" y="206">B</text><text class="d-c d-tinv d-xs" x="400" y="224">r × k</text>
  <rect class="d-chip" x="233" y="252" width="200" height="22" rx="11"/><text class="d-c d-tac d-xs" x="333" y="267">LoRA branch · trainable 🔥</text>

  <!-- merge arrows to sum -->
  <line class="d-line" x1="428" y1="99" x2="540" y2="140" marker-end="url(#ar-aEb)"/>
  <line class="d-line-accent" x1="448" y1="209" x2="540" y2="160" marker-end="url(#ar-aEb)"/>

  <!-- sum node -->
  <rect class="d-node" x="544" y="124" width="58" height="52" rx="14"/><text class="d-c d-bold" x="573" y="158">+</text>

  <!-- output -->
  <line class="d-line-accent" x1="602" y1="150" x2="640" y2="150" marker-end="url(#ar-aEb)"/>
  <rect class="d-fill-accent" x="642" y="126" width="92" height="48" rx="11"/><text class="d-c d-tinv d-bold" x="688" y="156">output</text>
</svg>
