<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-nw d-nw">
  <title id="t-nw">Next-word prediction and autoregression</title>
  <desc id="d-nw">The model reads the words so far, predicts the next word, then appends it and repeats.</desc>
  <defs>
    <marker id="ar-nw" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" class="d-arrow"/></marker>
    <marker id="ar-nwa" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" class="d-arrow-accent"/></marker>
  </defs>

  <text class="d-c d-tmut d-xs" x="174" y="46">the words so far (context)</text>
  <rect class="d-panel" x="24" y="56" width="300" height="80" rx="13"/>
  <g font-size="13">
    <rect class="d-node" x="40" y="74" width="48" height="40" rx="8"/><text class="d-c" x="64" y="99">The</text>
    <rect class="d-node" x="94" y="74" width="48" height="40" rx="8"/><text class="d-c" x="118" y="99">cat</text>
    <rect class="d-node" x="148" y="74" width="48" height="40" rx="8"/><text class="d-c" x="172" y="99">sat</text>
    <rect class="d-node" x="202" y="74" width="42" height="40" rx="8"/><text class="d-c" x="223" y="99">on</text>
    <rect class="d-node" x="250" y="74" width="58" height="40" rx="8"/><text class="d-c" x="279" y="99">the…</text>
  </g>

  <rect class="d-soft" x="378" y="62" width="150" height="68" rx="13"/>
  <text class="d-c d-tac d-bold" x="453" y="92" font-size="15">GPT model</text>
  <text class="d-c d-tac d-xs" x="453" y="112">predict next word</text>

  <rect class="d-fill-accent" x="580" y="72" width="120" height="48" rx="11"/>
  <text class="d-c d-tinv d-bold" x="640" y="102" font-size="16">mat</text>
  <text class="d-c d-tmut d-xs" x="640" y="140">predicted next word</text>

  <line class="d-line" x1="324" y1="96" x2="374" y2="96" marker-end="url(#ar-nw)"/>
  <line class="d-line-accent" x1="528" y1="96" x2="576" y2="96" marker-end="url(#ar-nwa)"/>

  <path class="d-dash" d="M640 120 L640 230 L174 230 L174 136" marker-end="url(#ar-nw)"/>
  <rect class="d-chip" x="193" y="215" width="374" height="30" rx="15"/>
  <text class="d-c d-tmut d-xs" x="380" y="234">append the word, then repeat — autoregression</text>
</svg>
