<svg viewBox="0 0 760 412" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-ch d-ch">
  <title id="t-ch">Adding a classification head and freezing layers</title>
  <desc id="d-ch">The pretrained GPT stack keeps its embedding and lower transformer blocks frozen, while the last transformer block, the final layer norm, and a new two-class linear head are made trainable. The original 50,257-way output head is replaced.</desc>
  <defs>
    <marker id="ar-c6b" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" class="d-arrow"/></marker>
  </defs>

  <text class="d-c d-bold" x="248" y="32" font-size="15">GPT-2 adapted for spam classification</text>

  <!-- stack, bottom (input) to top (output) -->
  <!-- frozen: token + pos embeddings -->
  <rect class="d-node-2" x="148" y="338" width="200" height="44" rx="10"/>
  <text class="d-c d-s" x="248" y="365">&#10052; token + positional embeddings</text>

  <!-- frozen: 11 transformer blocks -->
  <rect class="d-node-2" x="148" y="280" width="200" height="44" rx="10"/>
  <text class="d-c d-s" x="248" y="301">&#10052; transformer blocks 1&#8211;11</text>
  <text class="d-c d-tmut d-xs" x="248" y="317">frozen &#183; keep pretrained knowledge</text>

  <!-- trainable: last transformer block -->
  <rect class="d-soft" x="148" y="222" width="200" height="44" rx="10"/>
  <text class="d-c d-tac d-s" x="248" y="249">&#128293; transformer block 12</text>

  <!-- trainable: final layernorm -->
  <rect class="d-soft" x="148" y="164" width="200" height="40" rx="10"/>
  <text class="d-c d-tac d-s" x="248" y="189">&#128293; final LayerNorm</text>

  <!-- trainable: new head -->
  <rect class="d-fill-accent" x="148" y="92" width="200" height="54" rx="11"/>
  <text class="d-c d-tinv d-bold d-s" x="248" y="116">&#128293; Linear(768 &#8594; 2)</text>
  <text class="d-c d-tinv d-xs" x="248" y="134">new classification head</text>

  <!-- vertical flow arrows -->
  <line class="d-line" x1="248" y1="338" x2="248" y2="328" marker-end="url(#ar-c6b)"/>
  <line class="d-line" x1="248" y1="280" x2="248" y2="270" marker-end="url(#ar-c6b)"/>
  <line class="d-line" x1="248" y1="222" x2="248" y2="208" marker-end="url(#ar-c6b)"/>
  <line class="d-line-accent" x1="248" y1="164" x2="248" y2="150" marker-end="url(#ar-c6b)"/>

  <text class="d-c d-tmut d-xs" x="248" y="402">tokenized text in &#8595; &#8594; 2 logits out &#8593;</text>

  <!-- replaced head note -->
  <rect class="d-node" x="430" y="92" width="222" height="54" rx="11" opacity="0.55"/>
  <text class="d-c d-s" x="541" y="114" opacity="0.8">old: Linear(768 &#8594; 50257)</text>
  <text class="d-c d-tmut d-xs" x="541" y="132">removed &#8212; vocabulary head</text>
  <line class="d-dash" x1="430" y1="119" x2="350" y2="119" marker-end="url(#ar-c6b)"/>
  <text class="d-c d-tmut d-xs" x="541" y="166">swapped for the 2-class head</text>

  <!-- legend -->
  <rect class="d-node-2" x="430" y="300" width="24" height="24" rx="6"/>
  <text class="d-s" x="464" y="317">&#10052; frozen (requires_grad = False)</text>
  <rect class="d-soft" x="430" y="338" width="24" height="24" rx="6"/>
  <text class="d-s" x="464" y="355">&#128293; trainable (requires_grad = True)</text>
</svg>
