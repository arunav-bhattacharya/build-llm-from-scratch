<svg viewBox="0 0 760 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-bpe d-bpe">
  <title id="t-bpe">Byte pair encoding of an unknown word</title>
  <desc id="d-bpe">An unknown word is broken into known subword pieces, each mapped to a token ID.</desc>
  <defs>
    <marker id="ar-bpe" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" class="d-arrow"/></marker>
  </defs>

  <rect class="d-node" x="300" y="22" width="160" height="42" rx="10"/>
  <text class="d-c d-s d-bold" x="380" y="48">"Akwirw ier"</text>
  <text class="d-c d-tmut d-xs" x="380" y="16">unknown word</text>
  <line class="d-line" x1="380" y1="64" x2="380" y2="92" marker-end="url(#ar-bpe)"/>
  <text class="d-c d-tac d-xs d-bold" x="470" y="84">split into subwords</text>

  <g font-size="13">
    <rect class="d-node" x="145" y="104" width="64" height="36" rx="8"/><text class="d-c" x="177" y="127">Ak</text>
    <rect class="d-node" x="227" y="104" width="64" height="36" rx="8"/><text class="d-c" x="259" y="127">w</text>
    <rect class="d-node" x="309" y="104" width="64" height="36" rx="8"/><text class="d-c" x="341" y="127">ir</text>
    <rect class="d-node" x="391" y="104" width="64" height="36" rx="8"/><text class="d-c" x="423" y="127">w</text>
    <rect class="d-node" x="473" y="104" width="64" height="36" rx="8"/><text class="d-c" x="505" y="127">(space)</text>
    <rect class="d-node" x="555" y="104" width="64" height="36" rx="8"/><text class="d-c" x="587" y="127">ier</text>
  </g>

  <line class="d-line" x1="177" y1="140" x2="177" y2="176" marker-end="url(#ar-bpe)"/>
  <line class="d-line" x1="259" y1="140" x2="259" y2="176" marker-end="url(#ar-bpe)"/>
  <line class="d-line" x1="341" y1="140" x2="341" y2="176" marker-end="url(#ar-bpe)"/>
  <line class="d-line" x1="423" y1="140" x2="423" y2="176" marker-end="url(#ar-bpe)"/>
  <line class="d-line" x1="505" y1="140" x2="505" y2="176" marker-end="url(#ar-bpe)"/>
  <line class="d-line" x1="587" y1="140" x2="587" y2="176" marker-end="url(#ar-bpe)"/>

  <g font-size="12.5">
    <rect class="d-soft" x="143" y="184" width="68" height="34" rx="8"/><text class="d-c d-tac d-bold" x="177" y="206">33901</text>
    <rect class="d-soft" x="227" y="184" width="64" height="34" rx="8"/><text class="d-c d-tac d-bold" x="259" y="206">86</text>
    <rect class="d-soft" x="309" y="184" width="64" height="34" rx="8"/><text class="d-c d-tac d-bold" x="341" y="206">343</text>
    <rect class="d-soft" x="391" y="184" width="64" height="34" rx="8"/><text class="d-c d-tac d-bold" x="423" y="206">86</text>
    <rect class="d-soft" x="473" y="184" width="64" height="34" rx="8"/><text class="d-c d-tac d-bold" x="505" y="206">220</text>
    <rect class="d-soft" x="555" y="184" width="64" height="34" rx="8"/><text class="d-c d-tac d-bold" x="587" y="206">959</text>
  </g>
  <text class="d-c d-tmut d-xs" x="380" y="242">token IDs — no &lt;|unk|&gt; needed</text>
</svg>
