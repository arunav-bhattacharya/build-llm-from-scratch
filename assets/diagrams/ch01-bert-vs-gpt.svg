<svg viewBox="0 0 760 352" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-bg d-bg">
  <title id="t-bg">BERT versus GPT</title>
  <desc id="d-bg">BERT uses the encoder and fills in masked words from both-sided context; GPT uses the decoder and predicts the next word left to right.</desc>
  <defs>
    <marker id="ar-bg" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" class="d-arrow"/></marker>
  </defs>

  <rect class="d-panel" x="24" y="24" width="338" height="304" rx="16"/>
  <text class="d-c d-bold" x="193" y="58" font-size="16">BERT · Encoder</text>
  <text class="d-c d-tmut d-xs" x="193" y="77">sees the whole sentence at once</text>

  <rect class="d-node" x="39" y="98" width="308" height="42" rx="10"/>
  <text class="d-c d-s" x="193" y="124">This is an ___ of how concise I ___ be</text>

  <line class="d-line" x1="193" y1="140" x2="193" y2="180" marker-end="url(#ar-bg)"/>
  <text class="d-c d-tmut d-xs" x="193" y="170">fills in the masked words</text>

  <rect class="d-node" x="39" y="188" width="308" height="42" rx="10"/>
  <text class="d-c d-s" x="193" y="214">This is an example of how concise I can be</text>

  <rect class="d-fill-blue" x="58" y="266" width="270" height="42" rx="12"/>
  <text class="d-c d-tblue d-s d-bold" x="193" y="285">Best for classification</text>
  <text class="d-c d-tblue d-xs" x="193" y="301">sentiment · toxicity · topics</text>

  <rect class="d-panel" x="398" y="24" width="338" height="304" rx="16"/>
  <text class="d-c d-tac d-bold" x="567" y="58" font-size="16">GPT · Decoder</text>
  <text class="d-c d-tmut d-xs" x="567" y="77">sees only what came before</text>

  <rect class="d-node" x="412" y="98" width="310" height="42" rx="10"/>
  <text class="d-c d-s" x="567" y="124">This is an example of how concise I can</text>

  <line class="d-line" x1="567" y1="140" x2="567" y2="180" marker-end="url(#ar-bg)"/>
  <text class="d-c d-tmut d-xs" x="567" y="170">predicts the next word</text>

  <rect class="d-node" x="412" y="188" width="310" height="42" rx="10"/>
  <text class="d-c d-s" x="567" y="214">… can <tspan class="d-tac d-bold">be</tspan>  ← next word</text>

  <rect class="d-fill-soft" x="432" y="266" width="270" height="42" rx="12"/>
  <text class="d-c d-tac d-s d-bold" x="567" y="285">Best for generation</text>
  <text class="d-c d-tac d-xs" x="567" y="301">writing · code · chat</text>
</svg>
