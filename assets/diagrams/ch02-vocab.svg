<svg viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-vc d-vc">
  <title id="t-vc">Building a vocabulary</title>
  <desc id="d-vc">Unique tokens are sorted alphabetically and each is assigned a unique integer token ID.</desc>

  <rect class="d-node" x="248" y="34" width="264" height="252" rx="12"/>
  <text class="d-c d-bold d-s" x="330" y="62">token</text>
  <text class="d-c d-bold d-s" x="452" y="62">ID</text>
  <line class="d-line" x1="266" y1="74" x2="494" y2="74"/>
  <line class="d-line" x1="408" y1="80" x2="408" y2="270"/>

  <g font-size="13">
    <text class="d-c" x="330" y="98">brown</text><text class="d-c d-tac d-bold" x="452" y="98">0</text>
    <text class="d-c" x="330" y="124">dog</text><text class="d-c d-tac d-bold" x="452" y="124">1</text>
    <text class="d-c" x="330" y="150">fox</text><text class="d-c d-tac d-bold" x="452" y="150">2</text>
    <text class="d-c" x="330" y="176">jumps</text><text class="d-c d-tac d-bold" x="452" y="176">3</text>
    <text class="d-c" x="330" y="202">lazy</text><text class="d-c d-tac d-bold" x="452" y="202">4</text>
    <text class="d-c" x="330" y="228">over</text><text class="d-c d-tac d-bold" x="452" y="228">5</text>
    <text class="d-c" x="330" y="254">quick</text><text class="d-c d-tac d-bold" x="452" y="254">6</text>
  </g>
  <text class="d-c d-tmut d-xs" x="380" y="306">unique tokens, sorted alphabetically → integer token IDs</text>
</svg>
