<svg viewBox="0 0 760 226" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-tok d-tok">
  <title id="t-tok">Tokenizing text</title>
  <desc id="d-tok">A sentence is split into individual word and punctuation tokens.</desc>
  <defs>
    <marker id="ar-tok" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" class="d-arrow"/></marker>
  </defs>

  <rect class="d-node" x="180" y="26" width="400" height="46" rx="11"/>
  <text class="d-c d-s" x="380" y="54">Hello, world. Is this-- a test?</text>
  <text class="d-c d-tmut d-xs" x="380" y="20">input text</text>

  <line class="d-line" x1="380" y1="72" x2="380" y2="108" marker-end="url(#ar-tok)"/>
  <text class="d-c d-tac d-xs d-bold" x="450" y="94">split on spaces &amp; punctuation</text>

  <g font-size="13">
    <rect class="d-node" x="60" y="128" width="62" height="38" rx="8"/><text class="d-c" x="91" y="152">Hello</text>
    <rect class="d-node" x="128" y="128" width="30" height="38" rx="8"/><text class="d-c" x="143" y="152">,</text>
    <rect class="d-node" x="164" y="128" width="64" height="38" rx="8"/><text class="d-c" x="196" y="152">world</text>
    <rect class="d-node" x="234" y="128" width="30" height="38" rx="8"/><text class="d-c" x="249" y="152">.</text>
    <rect class="d-node" x="270" y="128" width="42" height="38" rx="8"/><text class="d-c" x="291" y="152">Is</text>
    <rect class="d-node" x="318" y="128" width="56" height="38" rx="8"/><text class="d-c" x="346" y="152">this</text>
    <rect class="d-node" x="380" y="128" width="44" height="38" rx="8"/><text class="d-c" x="402" y="152">--</text>
    <rect class="d-node" x="430" y="128" width="32" height="38" rx="8"/><text class="d-c" x="446" y="152">a</text>
    <rect class="d-node" x="468" y="128" width="56" height="38" rx="8"/><text class="d-c" x="496" y="152">test</text>
    <rect class="d-node" x="530" y="128" width="30" height="38" rx="8"/><text class="d-c" x="545" y="152">?</text>
  </g>
  <text class="d-c d-tmut d-xs" x="380" y="192">10 tokens</text>
</svg>
