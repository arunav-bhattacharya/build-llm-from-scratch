<svg viewBox="0 0 760 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-ge d-ge">
  <title id="t-ge">GELU versus ReLU</title>
  <desc id="d-ge">GELU is a smooth curve that bends gently and allows small negative outputs, while ReLU has a sharp corner at zero and clips all negatives to zero.</desc>

  <text class="d-c d-tac d-bold" x="205" y="34" font-size="15">GELU — smooth</text>
  <text class="d-c d-bold" x="575" y="34" font-size="15">ReLU — kinked</text>

  <!-- GELU panel axes -->
  <line class="d-line" x1="70" y1="55" x2="70" y2="185"/>
  <line class="d-line" x1="55" y1="152.5" x2="340" y2="152.5"/>
  <text class="d-tmut d-xs" x="44" y="60">y</text>
  <text class="d-tmut d-xs" x="344" y="168">x</text>
  <text class="d-tmut d-xs" x="208" y="200">0</text>
  <!-- GELU curve -->
  <polyline class="d-line-accent" points="70.0,152.6 83.5,152.8 97.0,153.1 110.5,153.7 124.0,154.6 137.5,155.8 151.0,157.0 164.5,157.9 178.0,157.8 191.5,156.2 205.0,152.5 218.5,146.5 232.0,138.3 245.5,128.6 259.0,118.0 272.5,107.0 286.0,96.1 299.5,85.5 313.0,75.1 326.5,65.0 340.0,55.1"/>
  <text class="d-tmut d-xs" x="78" y="148">small negative dip</text>

  <!-- ReLU panel axes -->
  <line class="d-line" x1="440" y1="55" x2="440" y2="185"/>
  <line class="d-line" x1="425" y1="152.5" x2="710" y2="152.5"/>
  <text class="d-tmut d-xs" x="414" y="60">y</text>
  <text class="d-tmut d-xs" x="714" y="168">x</text>
  <text class="d-tmut d-xs" x="578" y="200">0</text>
  <!-- ReLU curve -->
  <polyline class="d-line" points="440.0,152.5 480.5,152.5 521.0,152.5 561.5,152.5 575.0,152.5 595.2,137.9 622.2,118.4 649.2,98.9 676.2,79.4 710.0,55.0" style="fill:none"/>
  <text class="d-tmut d-xs" x="448" y="148">flat zero for x &lt; 0</text>

  <text class="d-c d-tmut d-xs" x="380" y="228">GELU's non-zero gradient on the negative side gives deep networks smoother optimization.</text>
</svg>
