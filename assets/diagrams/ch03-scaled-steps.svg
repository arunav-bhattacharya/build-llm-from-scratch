<svg viewBox="0 0 760 210" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-ss d-ss">
  <title id="t-ss">Scaled dot-product attention, step by step</title>
  <desc id="d-ss">Score query against keys, scale by the square root of the key dimension, softmax into weights, then take the weighted sum of values.</desc>
  <defs>
    <marker id="ar-ss" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" class="d-arrow"/></marker>
  </defs>

  <rect class="d-soft" x="24" y="84" width="86" height="42" rx="10"/><text class="d-c d-tac d-bold" x="67" y="110">Q · Kᵀ</text>
  <text class="d-c d-tmut d-xs" x="67" y="74">scores</text>

  <line class="d-line" x1="110" y1="105" x2="150" y2="105" marker-end="url(#ar-ss)"/>
  <rect class="d-node" x="152" y="84" width="92" height="42" rx="10"/><text class="d-c d-bold" x="198" y="110">÷ √dₖ</text>
  <text class="d-c d-tmut d-xs" x="198" y="74">scale</text>

  <line class="d-line" x1="244" y1="105" x2="284" y2="105" marker-end="url(#ar-ss)"/>
  <rect class="d-node" x="286" y="84" width="110" height="42" rx="10"/><text class="d-c d-bold" x="341" y="110">softmax</text>
  <text class="d-c d-tmut d-xs" x="341" y="74">weights (sum=1)</text>

  <line class="d-line" x1="396" y1="105" x2="436" y2="105" marker-end="url(#ar-ss)"/>
  <rect class="d-node" x="438" y="84" width="92" height="42" rx="10"/><text class="d-c d-bold" x="484" y="110">× V</text>
  <text class="d-c d-tmut d-xs" x="484" y="74">weight values</text>

  <line class="d-line-accent" x1="530" y1="105" x2="570" y2="105" marker-end="url(#ar-ss)"/>
  <rect class="d-fill-accent" x="572" y="84" width="164" height="42" rx="10"/><text class="d-c d-tinv d-bold" x="654" y="110">context vectors</text>

  <text class="d-c d-tmut d-xs" x="380" y="166">attention(Q, K, V) = softmax( Q·Kᵀ / √dₖ ) · V</text>
</svg>
