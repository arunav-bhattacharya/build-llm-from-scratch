<svg viewBox="0 0 760 318" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-bm d-bm">
  <title id="t-bm">Batching: padding, shifted targets, and -100 masking</title>
  <desc id="d-bm">Inputs are padded to equal length with token 50256. Targets are the inputs shifted one position to the right. All padding tokens in the target except the first are replaced with -100 so the loss ignores them.</desc>
  <defs>
    <marker id="ar-c7b" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" class="d-arrow-accent"/></marker>
  </defs>

  <!-- INPUTS -->
  <text class="d-c d-bold d-s" x="180" y="40">Input (padded)</text>
  <text class="d-c d-tmut d-xs" x="180" y="58">pad with 50256 to the batch's longest row</text>

  <g font-size="12">
    <!-- row a -->
    <rect class="d-soft" x="40" y="72" width="48" height="30"/><text class="d-c" x="64" y="92">5</text>
    <rect class="d-soft" x="90" y="72" width="48" height="30"/><text class="d-c" x="114" y="92">6</text>
    <rect class="d-node-2" x="140" y="72" width="60" height="30"/><text class="d-c d-tmut" x="170" y="92">50256</text>
    <rect class="d-node-2" x="202" y="72" width="60" height="30"/><text class="d-c d-tmut" x="232" y="92">50256</text>
    <rect class="d-node-2" x="264" y="72" width="60" height="30"/><text class="d-c d-tmut" x="294" y="92">50256</text>
  </g>

  <!-- targets shifted: arrows -->
  <line class="d-line-accent" x1="64" y1="104" x2="64" y2="150" marker-end="url(#ar-c7b)"/>
  <text class="d-c d-tac d-xs" x="180" y="130">targets = inputs shifted right by one, + a trailing 50256</text>

  <!-- TARGETS -->
  <text class="d-c d-bold d-s" x="180" y="186">Target (shifted, then masked)</text>

  <g font-size="12">
    <rect class="d-soft" x="40" y="200" width="48" height="30"/><text class="d-c" x="64" y="220">6</text>
    <rect class="d-fill-accent" x="90" y="200" width="60" height="30"/><text class="d-c d-tinv d-bold" x="120" y="220">50256</text>
    <rect class="d-node-2" x="152" y="200" width="56" height="30"/><text class="d-c d-tmut d-bold" x="180" y="220">-100</text>
    <rect class="d-node-2" x="210" y="200" width="56" height="30"/><text class="d-c d-tmut d-bold" x="238" y="220">-100</text>
    <rect class="d-node-2" x="268" y="200" width="56" height="30"/><text class="d-c d-tmut d-bold" x="296" y="220">-100</text>
  </g>

  <!-- callouts under targets -->
  <line class="d-dash" x1="120" y1="230" x2="120" y2="258"/>
  <text class="d-c d-tac d-xs" x="120" y="274">keep ONE 50256</text>
  <text class="d-c d-tmut d-xs" x="120" y="290">(learn to stop)</text>
  <line class="d-dash" x1="238" y1="230" x2="238" y2="258"/>
  <text class="d-c d-tmut d-xs" x="238" y="274">extra padding → -100</text>

  <!-- legend / why -->
  <rect class="d-panel" x="392" y="72" width="344" height="158" rx="12"/>
  <text class="d-c d-bold d-s" x="564" y="98">Why -100?</text>
  <rect class="d-node-2" x="412" y="118" width="22" height="22"/><text class="d-s" x="444" y="134">padding 50256 → replaced by -100</text>
  <rect class="d-fill-accent" x="412" y="150" width="22" height="22"/><text class="d-s" x="444" y="166">first 50256 kept (end-of-text signal)</text>
  <text class="d-s d-tmut" x="412" y="198" font-size="11.5">PyTorch cross_entropy ignores index -100,</text>
  <text class="d-s d-tmut" x="412" y="214" font-size="11.5">so blank padding never affects the loss.</text>

  <text class="d-c d-tmut d-xs" x="380" y="310">cross_entropy(logits, targets, ignore_index=-100)  —  the default</text>
</svg>
