<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-aEp d-aEp">
  <title id="t-aEp">Trainable parameters: full fine-tuning versus LoRA</title>
  <desc id="d-aEp">A bar comparison. Full fine-tuning trains about 124 million parameters, shown as a tall bar. LoRA at rank 16 trains only about 2.7 million parameters, shown as a tiny bar beside it — roughly a 50-times reduction.</desc>
  <defs>
    <marker id="ar-aEc" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" class="d-arrow"/></marker>
  </defs>

  <text class="d-c d-tmut d-xs" x="380" y="34">trainable parameters — LoRA trains ~50× fewer</text>

  <!-- y axis -->
  <line class="d-line" x1="150" y1="64" x2="150" y2="270" marker-end="url(#ar-aEc)"/>
  <!-- baseline -->
  <line class="d-line" x1="150" y1="270" x2="650" y2="270"/>
  <text class="d-c d-tmut d-xs" x="96" y="84">params</text>

  <!-- full fine-tuning bar (tall) -->
  <rect class="d-node-2" x="240" y="78" width="120" height="192" rx="6"/>
  <text class="d-c d-bold d-s" x="300" y="300">full fine-tuning</text>
  <text class="d-c d-bold" x="300" y="68">124M</text>
  <text class="d-c d-tinv d-bold d-s" x="300" y="180">all weights</text>

  <!-- LoRA bar (tiny: ~2.7/124 of the height ≈ 4px, draw a visible sliver ~6px) -->
  <rect class="d-fill-accent" x="460" y="262" width="120" height="8" rx="3"/>
  <text class="d-c d-bold d-s" x="520" y="300">LoRA (r = 16)</text>
  <text class="d-c d-tac d-bold" x="520" y="252">2.7M</text>

  <!-- reduction chip -->
  <rect class="d-chip" x="318" y="118" width="124" height="24" rx="12"/><text class="d-c d-tac d-xs d-bold" x="380" y="134">≈ 50× fewer</text>
  <line class="d-dash" x1="360" y1="142" x2="460" y2="258"/>

  <text class="d-c d-tmut d-xs" x="400" y="328">same task accuracy, a fraction of the trainable weights</text>
</svg>
