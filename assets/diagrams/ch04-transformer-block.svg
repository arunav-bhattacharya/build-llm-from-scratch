<svg viewBox="0 0 760 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-tb d-tb">
  <title id="t-tb">Inside a transformer block</title>
  <desc id="d-tb">Data flows through layer normalization, masked multi-head attention, and a feed-forward network, each wrapped by a shortcut connection that adds the block's input back to its output.</desc>
  <defs>
    <marker id="ar-c4tb" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" class="d-arrow"/></marker>
    <marker id="ar-c4tb-a" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" class="d-arrow-accent"/></marker>
  </defs>

  <!-- central flow column centered at x=300 -->
  <rect class="d-node" x="210" y="24" width="180" height="44" rx="11"/>
  <text class="d-c d-bold" x="300" y="51">input  (b, n, 768)</text>

  <line class="d-line" x1="300" y1="68" x2="300" y2="92" marker-end="url(#ar-c4tb)"/>
  <rect class="d-node" x="210" y="94" width="180" height="42" rx="11"/>
  <text class="d-c d-bold d-s" x="300" y="120">LayerNorm 1</text>

  <line class="d-line" x1="300" y1="136" x2="300" y2="160" marker-end="url(#ar-c4tb)"/>
  <rect class="d-soft" x="186" y="162" width="228" height="48" rx="11"/>
  <text class="d-c d-tac d-bold d-s" x="300" y="191">Masked Multi-Head Attention</text>

  <line class="d-line" x1="300" y1="210" x2="300" y2="234" marker-end="url(#ar-c4tb)"/>
  <rect class="d-node-2" x="232" y="236" width="136" height="38" rx="10"/>
  <text class="d-c d-bold d-s" x="300" y="260">Dropout</text>

  <line class="d-line" x1="300" y1="274" x2="300" y2="296" marker-end="url(#ar-c4tb)"/>
  <rect class="d-node" x="240" y="298" width="120" height="40" rx="11"/>
  <text class="d-c d-bold" x="300" y="324">+  add</text>

  <line class="d-line" x1="300" y1="338" x2="300" y2="360" marker-end="url(#ar-c4tb)"/>
  <rect class="d-node" x="210" y="362" width="180" height="40" rx="11"/>
  <text class="d-c d-bold d-s" x="300" y="387">LayerNorm 2</text>

  <line class="d-line" x1="300" y1="402" x2="300" y2="424" marker-end="url(#ar-c4tb)"/>
  <rect class="d-soft" x="210" y="426" width="180" height="40" rx="11"/>
  <text class="d-c d-tac d-bold d-s" x="300" y="451">FeedForward (GELU)</text>

  <line class="d-line" x1="300" y1="466" x2="300" y2="486" marker-end="url(#ar-c4tb)"/>
  <rect class="d-node" x="240" y="488" width="120" height="38" rx="11"/>
  <text class="d-c d-bold d-s" x="300" y="512">+  add</text>

  <line class="d-line" x1="300" y1="526" x2="300" y2="540"/>
  <text class="d-c d-tmut d-xs" x="300" y="554">output (b, n, 768) — same shape</text>

  <!-- shortcut 1: from input down right side to first add -->
  <path class="d-line-accent" d="M390 46 H470 V318 H362" fill="none" marker-end="url(#ar-c4tb-a)"/>
  <rect class="d-chip" x="486" y="168" width="92" height="26" rx="8"/>
  <text class="d-c d-tac d-xs d-bold" x="532" y="185">shortcut 1</text>

  <!-- shortcut 2: from after first add down right to second add -->
  <path class="d-line-accent" d="M360 318 H520 V507 H362" fill="none" marker-end="url(#ar-c4tb-a)"/>
  <rect class="d-chip" x="536" y="404" width="92" height="26" rx="8"/>
  <text class="d-c d-tac d-xs d-bold" x="582" y="421">shortcut 2</text>

  <!-- left annotations -->
  <text class="d-tmut d-xs" x="24" y="190">finds relationships</text>
  <text class="d-tmut d-xs" x="24" y="204">between tokens</text>
  <text class="d-tmut d-xs" x="24" y="444">transforms each</text>
  <text class="d-tmut d-xs" x="24" y="458">position on its own</text>
</svg>
