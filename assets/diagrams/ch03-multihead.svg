<svg viewBox="0 0 760 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-mh d-mh">
  <title id="t-mh">Multi-head attention</title>
  <desc id="d-mh">Several attention heads run in parallel on the same input; their context vectors are concatenated and projected to the output.</desc>
  <defs>
    <marker id="ar-mh" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" class="d-arrow"/></marker>
  </defs>

  <rect class="d-node" x="30" y="98" width="92" height="48" rx="11"/>
  <text class="d-c d-bold" x="76" y="120">input</text>
  <text class="d-c d-bold" x="76" y="138">X</text>

  <line class="d-line" x1="122" y1="116" x2="186" y2="58" marker-end="url(#ar-mh)"/>
  <line class="d-line" x1="122" y1="122" x2="186" y2="122" marker-end="url(#ar-mh)"/>
  <line class="d-line" x1="122" y1="128" x2="186" y2="186" marker-end="url(#ar-mh)"/>

  <rect class="d-soft" x="190" y="38" width="180" height="42" rx="10"/><text class="d-c d-tac d-bold d-s" x="280" y="64">Head 1 · attention</text>
  <rect class="d-soft" x="190" y="100" width="180" height="42" rx="10"/><text class="d-c d-tac d-bold d-s" x="280" y="126">Head 2 · attention</text>
  <rect class="d-soft" x="190" y="164" width="180" height="42" rx="10"/><text class="d-c d-tac d-bold d-s" x="280" y="190">Head 3 · attention</text>
  <text class="d-c d-tmut d-xs" x="280" y="226">each head: its own Q / K / V</text>

  <line class="d-line" x1="370" y1="59" x2="446" y2="108" marker-end="url(#ar-mh)"/>
  <line class="d-line" x1="370" y1="121" x2="446" y2="121" marker-end="url(#ar-mh)"/>
  <line class="d-line" x1="370" y1="185" x2="446" y2="136" marker-end="url(#ar-mh)"/>

  <rect class="d-node" x="450" y="100" width="116" height="44" rx="11"/><text class="d-c d-bold d-s" x="508" y="127">concat</text>

  <line class="d-line" x1="566" y1="122" x2="606" y2="122" marker-end="url(#ar-mh)"/>
  <rect class="d-node" x="608" y="100" width="120" height="44" rx="11"/><text class="d-c d-bold d-s" x="668" y="120">output</text>
  <text class="d-c d-bold d-s" x="668" y="136">projection</text>
</svg>
